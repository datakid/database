<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LX Database</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&family=Fraunces:opsz,wght@9..144,300;9..144,400&display=swap" rel="stylesheet">
    <script>
        const savedTheme = localStorage.getItem('lx-theme') || 'system';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        :root {
            --bg: #F7F6F3;
            --surface: #FFFFFF;
            --surface-hover: #F0F3F1;
            --border: #E6E4DD;
            --border-focus: #3A6B58;
            --text: #2D312E;
            --text-muted: #82877F;
            --accent: #3A6B58;
            --accent-light: #E8EFEA;
            --accent-text: #FFFFFF;
            --shadow: 0 4px 12px rgba(45, 49, 46, 0.04);
            --radius: 8px;
            --font-sans: 'Be Vietnam Pro', sans-serif;
            --font-serif: 'Fraunces', serif;
            --noise-opacity: 0.4;
            --row-height: 52px;
        }

        :root[data-theme="dark"] {
            --bg: #0F1110;
            --surface: #171A19;
            --surface-hover: #1E2221;
            --border: #262B29;
            --border-focus: #51B58C;
            --text: #E4E7E5;
            --text-muted: #8A918E;
            --accent: #51B58C;
            --accent-light: #1A2E26;
            --accent-text: #000000;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
            --noise-opacity: 0.15;
        }

        @media (prefers-color-scheme: dark) {
            :root[data-theme="system"] {
                --bg: #0F1110;
                --surface: #171A19;
                --surface-hover: #1E2221;
                --border: #262B29;
                --border-focus: #51B58C;
                --text: #E4E7E5;
                --text-muted: #8A918E;
                --accent: #51B58C;
                --accent-light: #1A2E26;
                --accent-text: #000000;
                --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
                --noise-opacity: 0.15;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            opacity: var(--noise-opacity);
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            transition: opacity 0.4s ease;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.6s ease-out;
            gap: 1rem;
        }

        .header h1 {
            font-family: var(--font-serif);
            font-size: 2.25rem;
            font-weight: 300;
            letter-spacing: -0.02em;
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .theme-toggle {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 0.25rem;
            position: relative;
            box-shadow: var(--shadow);
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .theme-btn {
            background: none;
            border: none;
            width: 36px;
            height: 32px;
            border-radius: 16px;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            transition: color 0.3s ease;
        }

        .theme-btn:hover {
            color: var(--text);
        }

        .theme-btn.active {
            color: var(--accent);
        }

        .theme-slider {
            position: absolute;
            top: 0.25rem;
            left: 0.25rem;
            width: 36px;
            height: 32px;
            background: var(--accent-light);
            border-radius: 16px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.4s ease;
            z-index: 0;
            pointer-events: none;
        }

        :root[data-theme="light"] .theme-slider { transform: translateX(0); }
        :root[data-theme="system"] .theme-slider { transform: translateX(36px); }
        :root[data-theme="dark"] .theme-slider { transform: translateX(72px); }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: "";
            position: absolute;
            right: 1rem;
            top: 50%;
            width: 8px;
            height: 8px;
            border-right: 1.5px solid var(--text);
            border-bottom: 1.5px solid var(--text);
            pointer-events: none;
            transform: translateY(-70%) rotate(45deg);
        }

        select, input {
            appearance: none;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.75rem 2.5rem 0.75rem 1rem;
            border-radius: var(--radius);
            font-family: var(--font-sans);
            font-size: 0.875rem;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
            width: 100%;
        }

        input { padding-right: 1rem; cursor: text; }

        select:focus, input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            position: relative;
            animation: fadeIn 0.6s ease-out 0.1s both;
        }

        select.active {
            border-color: var(--accent);
            background-color: var(--accent-light);
            color: var(--text);
            font-weight: 500;
        }

        .filters::after {
            content: attr(data-active-filters);
            position: absolute;
            top: -1.75rem;
            right: 0;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* --- NEW MODERN SEARCH UI --- */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            grid-column: span 2; /* Spans 2 columns for wider presence */
        }
        
        .search-container input {
            padding-left: 2.75rem;
            padding-right: 6rem;
            width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.2s ease;
        }

        .search-container:focus-within .search-icon {
            color: var(--accent);
        }

        .search-actions {
            position: absolute;
            right: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .shortcut-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 22px;
            padding: 0 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.65rem;
            color: var(--text-muted);
            background: var(--bg);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .search-container.has-value .shortcut-hint {
            opacity: 0;
            transform: scale(0.9);
        }

        .exact-match-btn {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .exact-match-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .exact-match-btn.active {
            background: var(--accent-light);
            color: var(--accent);
            border-color: var(--border-focus);
        }
        /* --- END SEARCH UI --- */

        .reset-filters {
            grid-column: 1 / -1;
            background-color: var(--accent);
            color: var(--accent-text);
            cursor: pointer;
            border: none;
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            font-family: var(--font-sans);
            font-weight: 500;
            font-size: 0.875rem;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .reset-filters:hover { opacity: 0.9; transform: translateY(-1px); }

        .result-count {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
            animation: fadeIn 0.6s ease-out 0.15s both;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            animation: fadeIn 0.6s ease-out 0.2s both;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, background-color 0.4s ease, border-color 0.4s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--border-focus);
        }

        .stat-value {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--accent);
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .table-container {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
            animation: fadeIn 0.6s ease-out 0.3s both;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .table-grid-row {
            display: grid;
            grid-template-columns: 2.5fr 1.5fr 1fr 1fr 1fr 1fr 1fr;
            gap: 1rem;
            padding: 0 1.5rem;
            align-items: center;
            min-width: 920px;
        }

        .table-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .header-cell {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
            height: 48px;
            display: flex;
            align-items: center;
        }

        .table-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            position: relative;
            will-change: transform;
        }

        .v-row {
            position: absolute;
            left: 0;
            width: 100%;
            height: var(--row-height);
            border-bottom: 1px solid var(--border);
            transition: background-color 0.15s ease, border-color 0.4s ease;
        }

        .v-row:hover { background-color: var(--surface-hover); }

        .v-cell {
            font-size: 0.875rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loader-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, background-color 0.4s ease;
        }

        .loader-overlay.active { opacity: 1; pointer-events: all; }

        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 2px solid var(--border);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: stretch; }
            .controls-group { justify-content: space-between; }
            .filters { grid-template-columns: 1fr; }
            .search-container { grid-column: 1 / -1; }
        }
    </style>
</head>
<body>

    <div class="loader-overlay active" id="loader">
        <div class="loader-spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>LX Database</h1>
            <div class="controls-group">
                <div class="theme-toggle" role="radiogroup" aria-label="Theme selector">
                    <button class="theme-btn" data-value="light" aria-label="Light theme">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    </button>
                    <button class="theme-btn" data-value="system" aria-label="System theme">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    </button>
                    <button class="theme-btn" data-value="dark" aria-label="Dark theme">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                    <div class="theme-slider"></div>
                </div>
                <div class="select-wrapper">
                    <select id="databaseSelect">
                        <option value="workforce">Workforce Database</option>
                        <option value="student">Student Database</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="filters" id="filtersContainer">
            
            <!-- NEW OMNI SEARCH COMPONENT -->
            <div class="search-container" id="searchContainer">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search" placeholder="Omni search across all columns..." autocomplete="off">
                <div class="search-actions">
                    <button id="exactMatchBtn" class="exact-match-btn" title="Toggle Exact Phrase Match">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="22" y1="12" x2="18" y2="12"></line>
                            <line x1="6" y1="12" x2="2" y2="12"></line>
                            <line x1="12" y1="6" x2="12" y2="2"></line>
                            <line x1="12" y1="22" x2="12" y2="18"></line>
                        </svg>
                    </button>
                    <div class="shortcut-hint">/</div>
                </div>
            </div>

            <div class="select-wrapper"><select id="pharmacy"><option value="">All Pharmacies</option></select></div>
            <div class="select-wrapper"><select id="region"><option value="">All Regions</option></select></div>
            <div class="select-wrapper"><select id="month"><option value="">All Months</option></select></div>
            <div class="select-wrapper"><select id="method"><option value="">All Methods</option></select></div>
            <div class="select-wrapper"><select id="unit"><option value="">All Unit Types</option></select></div>
            <button id="resetFilters" class="reset-filters">Reset Filters</button>
        </div>

        <div class="result-count" id="resultCount">Synchronizing...</div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalUnits">-</div>
                <div class="stat-label">Total Units Sold</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalMeds">-</div>
                <div class="stat-label">Unique Medications</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalPharmacies">-</div>
                <div class="stat-label">Active Pharmacies</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-grid-row table-header">
                <div class="header-cell">Medication</div>
                <div class="header-cell">Pharmacy</div>
                <div class="header-cell">Region</div>
                <div class="header-cell">Month</div>
                <div class="header-cell">Units Sold</div>
                <div class="header-cell">Unit Type</div>
                <div class="header-cell">Method</div>
            </div>
            <div class="table-scroll" id="scrollContainer">
                <div id="scrollSpacer"></div>
                <div id="scrollContent"></div>
            </div>
        </div>
    </div>

    <script>
        const ROW_HEIGHT = 52;
        const CACHE = new Map();
        const URLS = {
            workforce: "https://plan-b-d4c36-default-rtdb.firebaseio.com/pharmacyData.json",
            student: "https://plan-c-464c2-default-rtdb.firebaseio.com/pharmacyData.json"
        };

        const state = {
            data: [],
            filtered: [],
            db: 'workforce',
            filters: { 
                search: '', 
                exactMatch: false, // New Exact Match state
                pharmacy: '', region: '', month: '', method: '', unit: '' 
            }
        };

        const DOM = {
            loader: document.getElementById('loader'),
            dbSelect: document.getElementById('databaseSelect'),
            search: document.getElementById('search'),
            searchContainer: document.getElementById('searchContainer'),
            exactMatchBtn: document.getElementById('exactMatchBtn'),
            pharmacy: document.getElementById('pharmacy'),
            region: document.getElementById('region'),
            month: document.getElementById('month'),
            method: document.getElementById('method'),
            unit: document.getElementById('unit'),
            reset: document.getElementById('resetFilters'),
            totalUnits: document.getElementById('totalUnits'),
            totalMeds: document.getElementById('totalMeds'),
            totalPharmacies: document.getElementById('totalPharmacies'),
            resultCount: document.getElementById('resultCount'),
            filtersContainer: document.getElementById('filtersContainer'),
            scrollContainer: document.getElementById('scrollContainer'),
            scrollSpacer: document.getElementById('scrollSpacer'),
            scrollContent: document.getElementById('scrollContent'),
            themeBtns: document.querySelectorAll('.theme-btn')
        };

        let virtualNodes = [];
        let animationFrameId = null;

        function initThemeSwitcher() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'system';
            
            DOM.themeBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.value === currentTheme);
                
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.value;
                    document.documentElement.setAttribute('data-theme', theme);
                    localStorage.setItem('lx-theme', theme);
                    
                    DOM.themeBtns.forEach(b => b.classList.toggle('active', b.dataset.value === theme));
                });
            });
        }

        function initVirtualScroller() {
            DOM.scrollContent.style.position = 'absolute';
            DOM.scrollContent.style.top = '0';
            DOM.scrollContent.style.left = '0';
            DOM.scrollContent.style.width = '100%';

            const nodeCount = Math.ceil(600 / ROW_HEIGHT) + 4;

            for (let i = 0; i < nodeCount; i++) {
                const row = document.createElement('div');
                row.className = 'table-grid-row v-row';
                row.style.display = 'none';

                const cells = Array.from({length: 7}).map(() => {
                    const cell = document.createElement('div');
                    cell.className = 'v-cell';
                    row.appendChild(cell);
                    return cell;
                });

                DOM.scrollContent.appendChild(row);
                virtualNodes.push({ row, cells, index: -1 });
            }

            DOM.scrollContainer.addEventListener('scroll', () => {
                if (!animationFrameId) {
                    animationFrameId = requestAnimationFrame(() => {
                        updateVirtualScroller();
                        animationFrameId = null;
                    });
                }
            }, { passive: true });
        }

        function updateVirtualScroller(force = false) {
            const scrollTop = DOM.scrollContainer.scrollTop;
            const startIndex = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - 1);
            const endIndex = Math.min(state.filtered.length - 1, startIndex + virtualNodes.length - 1);

            let nodeIdx = 0;
            for (let i = startIndex; i <= endIndex; i++) {
                const node = virtualNodes[nodeIdx];
                if (force || node.index !== i) {
                    node.index = i;
                    const item = state.filtered[i];
                    node.row.style.transform = `translateY(${i * ROW_HEIGHT}px)`;
                    node.row.style.display = 'grid';
                    
                    node.cells[0].textContent = item.name;
                    node.cells[1].textContent = item.pharmacy;
                    node.cells[2].textContent = item.region;
                    node.cells[3].textContent = item.month;
                    node.cells[4].textContent = new Intl.NumberFormat().format(item.unitSold);
                    node.cells[5].textContent = item.unit;
                    node.cells[6].textContent = item.method;
                }
                nodeIdx++;
            }

            while (nodeIdx < virtualNodes.length) {
                const node = virtualNodes[nodeIdx];
                node.index = -1;
                node.row.style.display = 'none';
                nodeIdx++;
            }
        }

        async function loadData() {
            DOM.loader.classList.add('active');
            try {
                if (!CACHE.has(state.db)) {
                    const response = await fetch(URLS[state.db]);
                    const raw = await response.json();
                    
                    // PRE-COMPUTE OMNI-SEARCH INDEX FOR BLAZING FAST FILTERING O(N)
                    const parsedData = raw ? Object.values(raw).flat().map(item => ({
                        ...item,
                        // Create a hidden compiled string of all searchable text for this row
                        _searchStr: `${item.name} ${item.pharmacy} ${item.region} ${item.month} ${item.method} ${item.unit}`.toLowerCase()
                    })) : [];

                    CACHE.set(state.db, parsedData);
                }
                state.data = CACHE.get(state.db);
                processData();
            } catch (err) {
                DOM.resultCount.textContent = "Error loading database.";
            } finally {
                DOM.loader.classList.remove('active');
            }
        }

        function processData() {
            populateOptions();
            applyFilters();
        }

        function populateOptions() {
            const keys = ['pharmacy', 'region', 'month', 'method', 'unit'];
            const sets = Object.fromEntries(keys.map(k => [k, new Set()]));
            
            state.data.forEach(item => {
                keys.forEach(k => sets[k].add(item[k]));
            });

            keys.forEach(key => {
                const select = DOM[key];
                const current = select.value;
                const options = Array.from(sets[key]).sort();
                
                select.innerHTML = `<option value="">All ${key.charAt(0).toUpperCase() + key.slice(1)}s</option>`;
                const frag = document.createDocumentFragment();
                
                options.forEach(opt => {
                    const el = document.createElement('option');
                    el.value = opt;
                    el.textContent = opt;
                    frag.appendChild(el);
                });
                
                select.appendChild(frag);
                if (options.includes(current)) select.value = current;
            });
        }

        function applyFilters() {
            const query = state.filters.search.toLowerCase().trim();
            const isExact = state.filters.exactMatch;
            
            // Tokenize query for fuzzy omni-search (ignoring extra spaces)
            const searchTokens = (query && !isExact) ? query.split(/\s+/) : [];
            
            state.filtered = state.data.filter(item => {
                
                // 1. OMNI-SEARCH LOGIC
                if (query) {
                    if (isExact) {
                        // Exact match: the exact phrase must appear in the combined data string
                        if (!item._searchStr.includes(query)) return false;
                    } else {
                        // Fuzzy multi-term: EVERY token must be found somewhere in the row
                        // (e.g. "oxy injectable" matches a row with name "Oxycodone" and method "Injectable")
                        for (let i = 0; i < searchTokens.length; i++) {
                            if (!item._searchStr.includes(searchTokens[i])) return false;
                        }
                    }
                }

                // 2. STANDARD DROPDOWN FILTERS
                for (const key of ['pharmacy', 'region', 'month', 'method', 'unit']) {
                    if (state.filters[key] && item[key] !== state.filters[key]) return false;
                }
                return true;
            });

            updateUI();
        }

        function updateUI() {
            let units = 0;
            const meds = new Set();
            const pharms = new Set();

            state.filtered.forEach(item => {
                units += item.unitSold;
                meds.add(item.name);
                pharms.add(item.pharmacy);
            });

            const fmt = new Intl.NumberFormat();
            
            animateValue(DOM.totalUnits, units);
            animateValue(DOM.totalMeds, meds.size);
            animateValue(DOM.totalPharmacies, pharms.size);

            DOM.scrollSpacer.style.height = `${state.filtered.length * ROW_HEIGHT}px`;
            updateVirtualScroller(true);

            DOM.resultCount.textContent = `Showing ${fmt.format(state.filtered.length)} results`;
            
            let activeCount = 0;
            ['pharmacy', 'region', 'month', 'method', 'unit'].forEach(k => {
                const isActive = state.filters[k] !== '';
                DOM[k].classList.toggle('active', isActive);
                if (isActive) activeCount++;
            });
            
            if (state.filters.search) activeCount++;
            if (state.filters.exactMatch && state.filters.search) activeCount++; // Count exact match as a filter if active

            DOM.filtersContainer.setAttribute(
                'data-active-filters',
                activeCount ? `${activeCount} active filter${activeCount > 1 ? 's' : ''}` : ''
            );
        }

        function animateValue(obj, end) {
            const start = parseInt(obj.textContent.replace(/,/g, '')) || 0;
            if (start === end) {
                obj.textContent = new Intl.NumberFormat().format(end);
                return;
            }
            
            const duration = 600;
            const startTime = performance.now();
            const fmt = new Intl.NumberFormat();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(start + (end - start) * easeOut);
                
                obj.textContent = fmt.format(current);

                if (progress < 1) requestAnimationFrame(update);
                else obj.textContent = fmt.format(end);
            }
            requestAnimationFrame(update);
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        function bindEvents() {
            DOM.dbSelect.addEventListener('change', (e) => {
                state.db = e.target.value;
                loadData();
            });

            const handleFilter = (key) => (e) => {
                state.filters[key] = e.target.value;
                applyFilters();
            };

            // Modern Search Input Handling
            DOM.search.addEventListener('input', debounce((e) => {
                const val = e.target.value;
                state.filters.search = val;
                DOM.searchContainer.classList.toggle('has-value', val.length > 0);
                applyFilters();
            }, 100)); // Lower debounce for faster perceived speed

            // Exact Match Toggle
            DOM.exactMatchBtn.addEventListener('click', () => {
                state.filters.exactMatch = !state.filters.exactMatch;
                DOM.exactMatchBtn.classList.toggle('active', state.filters.exactMatch);
                
                // Re-trigger search if there's text
                if (state.filters.search) applyFilters();
            });
            
            // Focus Hotkey '/' 
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement !== DOM.search) {
                    e.preventDefault();
                    DOM.search.focus();
                }
            });
            
            ['pharmacy', 'region', 'month', 'method', 'unit'].forEach(key => {
                DOM[key].addEventListener('change', handleFilter(key));
            });

            DOM.reset.addEventListener('click', () => {
                state.filters = { search: '', exactMatch: false, pharmacy: '', region: '', month: '', method: '', unit: '' };
                
                DOM.search.value = '';
                DOM.searchContainer.classList.remove('has-value');
                DOM.exactMatchBtn.classList.remove('active');
                
                ['pharmacy', 'region', 'month', 'method', 'unit'].forEach(k => {
                    DOM[k].value = '';
                    DOM[k].classList.remove('active');
                });
                
                applyFilters();
            });

            window.addEventListener('resize', debounce(() => updateVirtualScroller(true), 100));
        }

        document.addEventListener('DOMContentLoaded', () => {
            initThemeSwitcher();
            initVirtualScroller();
            bindEvents();
            loadData();
        });
    </script>
</body>
</html>
