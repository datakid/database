<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LX Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500&display=swap" rel="stylesheet">
<script>
try {
const savedTheme = localStorage.getItem('lx-theme') || 'system';
document.documentElement.setAttribute('data-theme', savedTheme);
} catch (e) {
document.documentElement.setAttribute('data-theme', 'system');
}
</script>
<style>
:root {
color-scheme: light;
--bg: #F5F5F2;
--surface: #FFFFFF;
--surface-hover: #F0F0ED;
--border: #DCDCD6;
--border-focus: #224A3A;
--text: #111312;
--text-muted: #555957;
--accent: #224A3A;
--accent-light: #E8EFEA;
--accent-text: #FFFFFF;
--shadow: 0 6px 20px rgba(17, 19, 18, 0.06);
--radius: 8px;
--font-sans: 'IBM Plex Sans', system-ui, sans-serif;
--font-serif: 'IBM Plex Serif', Georgia, serif;
--noise-opacity: 0.5;
--row-height: 58px;
}

:root[data-theme="dark"] {
color-scheme: dark;
--bg: #0C0C0C;
--surface: #141414;
--surface-hover: #1E1E1E;
--border: #2A2A2A;
--border-focus: #67B896;
--text: #F5F5F5;
--text-muted: #A0A0A0;
--accent: #67B896;
--accent-light: #1A2B23;
--accent-text: #000000;
--shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
--noise-opacity: 0.2;
}

@media (prefers-color-scheme: dark) {
:root[data-theme="system"] {
color-scheme: dark;
--bg: #0C0C0C;
--surface: #141414;
--surface-hover: #1E1E1E;
--border: #2A2A2A;
--border-focus: #67B896;
--text: #F5F5F5;
--text-muted: #A0A0A0;
--accent: #67B896;
--accent-light: #1A2B23;
--accent-text: #000000;
--shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
--noise-opacity: 0.2;
}
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

html, body {
min-height: 100vh;
background-color: var(--bg);
color: var(--text);
}

body {
font-family: var(--font-sans);
font-size: 16px;
line-height: 1.6;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
transition: background-color 0.3s ease, color 0.3s ease;
}

body::before {
content: "";
position: fixed;
inset: 0;
opacity: var(--noise-opacity);
pointer-events: none;
z-index: 9999;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
transition: opacity 0.3s ease;
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

.container {
max-width: 1560px;
margin: 3rem auto;
padding: 0 2rem;
display: flex;
flex-direction: column;
gap: 2rem;
position: relative;
z-index: 1;
}

.header {
display: flex;
justify-content: space-between;
align-items: center;
animation: fadeIn 0.5s ease-out;
gap: 1.5rem;
}

.header h1 {
font-family: var(--font-serif);
font-size: 2.75rem;
font-weight: 500;
letter-spacing: -0.02em;
color: var(--text);
}

.controls-group {
display: flex;
align-items: center;
gap: 1rem;
flex-wrap: wrap;
}

.theme-toggle {
display: flex;
background: var(--surface);
border: 1px solid var(--border);
border-radius: 20px;
padding: 0.25rem;
position: relative;
box-shadow: var(--shadow);
transition: all 0.3s ease;
}

.theme-btn {
background: none;
border: none;
width: 36px;
height: 32px;
border-radius: 16px;
cursor: pointer;
color: var(--text-muted);
display: flex;
align-items: center;
justify-content: center;
z-index: 1;
transition: color 0.3s ease;
}

.theme-btn:hover { color: var(--text); }
.theme-btn.active { color: var(--accent); }

.theme-slider {
position: absolute;
top: 0.25rem;
left: 0.25rem;
width: 36px;
height: 32px;
background: var(--accent-light);
border-radius: 16px;
transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
z-index: 0;
pointer-events: none;
}

:root[data-theme="light"] .theme-slider { transform: translateX(0); }
:root[data-theme="system"] .theme-slider { transform: translateX(36px); }
:root[data-theme="dark"] .theme-slider { transform: translateX(72px); }

.btn-action, select, input {
appearance: none;
background: var(--surface);
border: 1px solid var(--border);
padding: 0.75rem 2.5rem 0.75rem 1rem;
border-radius: var(--radius);
font-family: var(--font-sans);
font-size: 0.95rem;
color: var(--text);
cursor: pointer;
transition: all 0.2s ease;
box-shadow: var(--shadow);
width: 100%;
}

.btn-action {
width: auto;
padding: 0.75rem 1.5rem;
display: flex;
align-items: center;
gap: 0.5rem;
font-weight: 500;
}

.btn-action:hover {
border-color: var(--border-focus);
background: var(--surface-hover);
}

input { padding-right: 1rem; cursor: text; }

select:focus, input:focus, .btn-action:focus {
outline: none;
border-color: var(--border-focus);
box-shadow: 0 0 0 3px var(--accent-light);
}

.select-wrapper { position: relative; }

.select-wrapper::after {
content: "";
position: absolute;
right: 1rem;
top: 50%;
width: 8px;
height: 8px;
border-right: 2px solid var(--text-muted);
border-bottom: 2px solid var(--text-muted);
pointer-events: none;
transform: translateY(-70%) rotate(45deg);
}

.clear-select {
position: absolute;
right: 2.25rem;
top: 50%;
transform: translateY(-50%);
background: none;
border: none;
color: var(--text-muted);
width: 24px;
height: 24px;
border-radius: 4px;
display: none;
align-items: center;
justify-content: center;
cursor: pointer;
z-index: 2;
transition: all 0.2s ease;
}

.clear-select:hover {
background: var(--surface-hover);
color: var(--text);
}

.select-wrapper.has-value .clear-select { display: flex; }
.select-wrapper.has-value select { padding-right: 4rem; }

.filters {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
gap: 1rem;
position: relative;
animation: fadeIn 0.5s ease-out 0.1s both;
}

select.active {
border-color: var(--accent);
background-color: var(--accent-light);
color: var(--text);
font-weight: 600;
}

.filters::after {
content: attr(data-active-filters);
position: absolute;
top: -1.5rem;
right: 0;
font-size: 0.8rem;
color: var(--text-muted);
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.05em;
}

.search-container {
position: relative;
display: flex;
align-items: center;
grid-column: span 2;
}

.search-container input {
padding-left: 3rem;
padding-right: 6rem;
font-size: 0.95rem;
}

.search-icon {
position: absolute;
left: 1.1rem;
color: var(--text-muted);
pointer-events: none;
transition: color 0.2s ease;
}

.search-container:focus-within .search-icon { color: var(--accent); }

.search-actions {
position: absolute;
right: 0.6rem;
display: flex;
align-items: center;
gap: 0.4rem;
}

.shortcut-hint {
display: flex;
align-items: center;
justify-content: center;
height: 24px;
padding: 0 8px;
border: 1px solid var(--border);
border-radius: 4px;
font-size: 0.75rem;
color: var(--text-muted);
background: var(--bg);
font-family: monospace;
pointer-events: none;
transition: opacity 0.3s ease;
}

.search-container.has-value .shortcut-hint { opacity: 0; }

.exact-match-btn {
background: transparent;
border: 1px solid transparent;
border-radius: 4px;
width: 28px;
height: 28px;
display: flex;
align-items: center;
justify-content: center;
color: var(--text-muted);
cursor: pointer;
transition: all 0.2s ease;
}

.exact-match-btn:hover {
background: var(--surface-hover);
color: var(--text);
}

.exact-match-btn.active {
background: var(--accent-light);
color: var(--accent);
border-color: var(--border-focus);
}

.reset-filters {
grid-column: 1 / -1;
background-color: var(--accent);
color: var(--accent-text);
cursor: pointer;
border: none;
padding: 0.75rem 1.5rem;
border-radius: var(--radius);
font-family: var(--font-sans);
font-weight: 500;
font-size: 0.95rem;
transition: transform 0.2s ease, opacity 0.2s ease;
}

.reset-filters:hover { opacity: 0.95; transform: translateY(-1px); }

.group-dock-container {
display: flex;
flex-wrap: wrap;
align-items: flex-start;
gap: 1rem;
animation: fadeIn 0.5s ease-out 0.15s both;
}

.group-dock {
display: flex;
flex-wrap: wrap;
gap: 0.6rem;
align-items: center;
background: var(--surface);
padding: 0.75rem 1.5rem;
border-radius: var(--radius);
border: 1px solid var(--border);
box-shadow: var(--shadow);
flex: 1;
}

.group-label {
font-size: 0.8rem;
font-weight: 600;
color: var(--text-muted);
text-transform: uppercase;
letter-spacing: 0.05em;
margin-right: 0.5rem;
}

.group-pill {
background: var(--bg);
border: 1px solid var(--border);
padding: 0.4rem 1rem;
border-radius: 20px;
font-size: 0.85rem;
color: var(--text);
cursor: pointer;
transition: all 0.2s ease;
font-family: var(--font-sans);
font-weight: 500;
}

.group-pill:hover { border-color: var(--border-focus); }

.group-pill.active {
background: var(--accent);
color: var(--accent-text);
border-color: var(--accent);
}

.duplicate-alert {
font-size: 0.85rem;
color: #115E59;
background: #CCFBF1;
padding: 0.75rem 1.25rem;
border-radius: var(--radius);
display: none;
flex-direction: column;
gap: 0.25rem;
border: 1px solid #99F6E4;
animation: fadeIn 0.5s ease-out;
box-shadow: var(--shadow);
max-width: 600px;
cursor: pointer;
transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.duplicate-alert:hover {
transform: translateY(-2px);
box-shadow: 0 8px 24px rgba(17, 19, 18, 0.12);
}

.duplicate-header {
display: flex;
align-items: center;
gap: 0.6rem;
font-weight: 500;
}

.duplicate-header strong {
color: #0F766E;
font-weight: 700;
}

:root[data-theme="dark"] .duplicate-alert {
background: #115E59;
color: #CCFBF1;
border-color: #0F766E;
}

:root[data-theme="dark"] .duplicate-alert:hover {
box-shadow: 0 8px 24px rgba(0, 0, 0, 0.8);
}

:root[data-theme="dark"] .duplicate-header strong {
color: #FFFFFF;
}

.result-count {
font-size: 0.9rem;
color: var(--text-muted);
font-weight: 500;
animation: fadeIn 0.5s ease-out 0.15s both;
}

.stats-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
gap: 1.5rem;
animation: fadeIn 0.5s ease-out 0.2s both;
}

.stat-card {
background: var(--surface);
padding: 1.75rem;
border-radius: var(--radius);
border: 1px solid var(--border);
box-shadow: var(--shadow);
transition: transform 0.2s ease, border-color 0.3s ease;
}

.stat-card:hover {
transform: translateY(-2px);
border-color: var(--border-focus);
}

.stat-value {
font-family: var(--font-serif);
font-size: 2.75rem;
font-weight: 400;
color: var(--accent);
line-height: 1.1;
margin-bottom: 0.5rem;
}

.stat-label {
color: var(--text-muted);
font-size: 0.85rem;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.05em;
}

.table-container {
background: var(--surface);
border-radius: var(--radius);
border: 1px solid var(--border);
box-shadow: var(--shadow);
overflow: hidden;
display: flex;
flex-direction: column;
height: 650px;
animation: fadeIn 0.5s ease-out 0.25s both;
}

.table-grid-row {
display: grid;
gap: 1rem;
padding: 0 1.5rem;
align-items: center;
min-width: 1000px;
}

.table-header {
background: var(--surface);
border-bottom: 2px solid var(--border);
z-index: 10;
}

.header-cell {
font-size: 0.8rem;
text-transform: uppercase;
letter-spacing: 0.05em;
color: var(--text-muted);
font-weight: 600;
height: 56px;
display: flex;
align-items: center;
transition: color 0.2s ease;
}

.header-cell.sortable {
cursor: pointer;
user-select: none;
position: relative;
}

.header-cell.sortable:hover { color: var(--text); }

.sort-icon {
margin-left: 0.5rem;
opacity: 0.2;
transition: opacity 0.2s, transform 0.2s;
}

.header-cell.sortable[data-dir="asc"] { color: var(--accent); }
.header-cell.sortable[data-dir="asc"] .sort-icon { opacity: 1; transform: rotate(180deg); }

.header-cell.sortable[data-dir="desc"] { color: var(--accent); }
.header-cell.sortable[data-dir="desc"] .sort-icon { opacity: 1; transform: rotate(0deg); }

.table-scroll {
flex: 1;
overflow-y: auto;
overflow-x: auto;
position: relative;
will-change: transform;
}

.v-row {
position: absolute;
left: 0;
width: 100%;
height: var(--row-height);
border-bottom: 1px solid var(--border);
transition: background-color 0.15s ease;
}

.v-row:hover { background-color: var(--surface-hover); }

.v-cell {
font-size: 0.95rem;
color: var(--text);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
font-weight: 500;
}

.loader-overlay {
position: fixed;
inset: 0;
background: var(--bg);
display: flex;
justify-content: center;
align-items: center;
z-index: 1000;
opacity: 0;
pointer-events: none;
transition: opacity 0.3s ease;
}

.loader-overlay.active { opacity: 1; pointer-events: all; }

.loader-spinner {
width: 48px;
height: 48px;
border: 3px solid var(--border);
border-radius: 50%;
border-top-color: var(--accent);
animation: spin 0.7s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
}

.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0, 0, 0, 0.5);
z-index: 10000;
display: none;
align-items: center;
justify-content: center;
backdrop-filter: blur(4px);
opacity: 0;
animation: fadeIn 0.3s forwards;
}

.modal-content {
background: var(--surface);
border: 1px solid var(--border);
border-radius: var(--radius);
width: 90%;
max-width: 800px;
max-height: 80vh;
display: flex;
flex-direction: column;
box-shadow: var(--shadow);
transform: translateY(20px);
animation: slideUp 0.3s forwards;
}

@keyframes slideUp {
to { transform: translateY(0); }
}

.modal-header {
padding: 1.5rem;
border-bottom: 1px solid var(--border);
display: flex;
justify-content: space-between;
align-items: center;
}

.modal-header h2 {
margin: 0;
font-family: var(--font-serif);
font-size: 1.5rem;
color: var(--text);
font-weight: 500;
}

.modal-header button {
background: none;
border: none;
font-size: 1.5rem;
cursor: pointer;
color: var(--text-muted);
transition: color 0.2s;
display: flex;
align-items: center;
justify-content: center;
}

.modal-header button:hover {
color: var(--text);
}

.modal-table-container {
overflow-y: auto;
padding: 1.5rem;
}

.dup-table {
width: 100%;
border-collapse: collapse;
text-align: left;
}

.dup-table th, .dup-table td {
padding: 0.75rem 0.5rem;
border-bottom: 1px solid var(--border);
color: var(--text);
font-size: 0.9rem;
}

.dup-table th {
font-weight: 600;
color: var(--text-muted);
text-transform: uppercase;
font-size: 0.8rem;
letter-spacing: 0.05em;
position: sticky;
top: -1.5rem;
background: var(--surface);
}

.unmerge-btn {
background: var(--surface);
border: 1px solid var(--border);
padding: 0.4rem 0.8rem;
border-radius: 4px;
cursor: pointer;
color: var(--text);
font-size: 0.8rem;
font-weight: 500;
transition: all 0.2s;
}

.unmerge-btn:hover {
background: var(--surface-hover);
border-color: var(--border-focus);
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 1024px) {
.header { flex-direction: column; align-items: stretch; }
.controls-group { justify-content: space-between; }
.filters { grid-template-columns: 1fr; }
.search-container { grid-column: 1 / -1; }
.group-dock-container { flex-direction: column; align-items: stretch; }
}
</style>

</head>
<body>
<div class="loader-overlay active" id="loader">
<div class="loader-spinner"></div>
</div>
<div class="container">
<div class="header">
<h1>LX Database</h1>
<div class="controls-group">
<div class="theme-toggle" role="radiogroup" aria-label="Theme selector">
<button class="theme-btn" data-value="light" aria-label="Light theme">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>
<button class="theme-btn" data-value="system" aria-label="System theme">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
</button>
<button class="theme-btn" data-value="dark" aria-label="Dark theme">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
<div class="theme-slider"></div>
</div>
<div class="select-wrapper">
<select id="databaseSelect">
<option value="all">All Databases</option>
<option value="Workforce">Workforce Database</option>
<option value="Student">Student Database</option>
</select>
</div>
<button id="downloadBtn" class="btn-action">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
Export CSV
</button>
</div>
</div>

<div class="filters" id="filtersContainer">
<div class="search-container" id="searchContainer">
<svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
</svg>
<input type="text" id="search" placeholder="Omni search across all columns..." autocomplete="off">
<div class="search-actions">
<button id="exactMatchBtn" class="exact-match-btn" title="Toggle Exact Phrase Match">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line>
<line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line>
<line x1="12" y1="22" x2="12" y2="18"></line>
</svg>
</button>
<div class="shortcut-hint">/</div>
</div>
</div>
<div class="select-wrapper">
<select id="pharmacy"><option value="">All Pharmacies</option></select>
<button class="clear-select" data-target="pharmacy" aria-label="Clear"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
</div>
<div class="select-wrapper">
<select id="region"><option value="">All Regions</option></select>
<button class="clear-select" data-target="region" aria-label="Clear"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
</div>
<div class="select-wrapper">
<select id="month"><option value="">All Months</option></select>
<button class="clear-select" data-target="month" aria-label="Clear"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
</div>
<div class="select-wrapper">
<select id="method"><option value="">All Methods</option></select>
<button class="clear-select" data-target="method" aria-label="Clear"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
</div>
<div class="select-wrapper">
<select id="unit"><option value="">All Unit Types</option></select>
<button class="clear-select" data-target="unit" aria-label="Clear"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
</div>
<button id="resetFilters" class="reset-filters">Reset Filters</button>
</div>

<div class="group-dock-container">
<div class="group-dock" id="groupDock">
<span class="group-label">Group By:</span>
<button class="group-pill" data-key="_source">Source</button>
<button class="group-pill" data-key="name">Medication</button>
<button class="group-pill" data-key="pharmacy">Pharmacy</button>
<button class="group-pill" data-key="region">Region</button>
<button class="group-pill" data-key="month">Month</button>
<button class="group-pill" data-key="unit">Unit Type</button>
<button class="group-pill" data-key="method">Method</button>
</div>
<div class="duplicate-alert" id="duplicateAlert">
<div class="duplicate-header">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
<span id="duplicateText"></span>
</div>
</div>
</div>

<div class="result-count" id="resultCount">Synchronizing...</div>

<div class="stats-grid">
<div class="stat-card">
<div class="stat-value" id="totalUnits">-</div>
<div class="stat-label">Total Units Sold</div>
</div>
<div class="stat-card">
<div class="stat-value" id="totalMeds">-</div>
<div class="stat-label">Unique Medications</div>
</div>
<div class="stat-card">
<div class="stat-value" id="totalPharmacies">-</div>
<div class="stat-label">Active Pharmacies</div>
</div>

<div class="table-container">
<div class="table-grid-row table-header" id="tableHeader"></div>
<div class="table-scroll" id="scrollContainer">
<div id="scrollSpacer"></div>
<div id="scrollContent"></div>
</div>
</div>
</div>

<div id="duplicateModal" class="modal-overlay">
<div class="modal-content">
<div class="modal-header">
<h2>Merged Duplicates Details</h2>
<button id="closeModal">&times;</button>
</div>
<div class="modal-table-container">
<table class="dup-table">
<thead>
<tr>
<th>Medication</th>
<th>Pharmacy</th>
<th>Region</th>
<th>Merged Rows</th>
<th>Total Units</th>
<th>Action</th>
</tr>
</thead>
<tbody id="duplicateTableBody"></tbody>
</table>
</div>
</div>
</div>

<script>
const ROW_HEIGHT = 58;
const URLS = {
workforce: "https://plan-b-d4c36-default-rtdb.firebaseio.com/pharmacyData.json",
student: "https://plan-c-464c2-default-rtdb.firebaseio.com/pharmacyData.json"
};

const COLUMNS = [
{ key: '_source', label: 'Source', width: '1fr' },
{ key: 'name', label: 'Medication', width: '2fr' },
{ key: 'pharmacy', label: 'Pharmacy', width: '1.5fr' },
{ key: 'region', label: 'Region', width: '1fr' },
{ key: 'month', label: 'Month', width: '1fr' },
{ key: 'unit', label: 'Unit Type', width: '1fr' },
{ key: 'method', label: 'Method', width: '1fr' },
{ key: 'unitSold', label: 'Units Sold', width: '1fr', isNum: true }
];

const state = {
allData: [],
filtered: [],
displayData: [],
db: 'all',
sort: { key: null, dir: 1 },
filters: { search: '', exactMatch: false, pharmacy: '', region: '', month: '', method: '', unit: '' },
groupBy: [],
lastColsHash: '',
rawGroups: new Map(),
unmergedHashes: new Set(),
currentMergedGroups: []
};

const DOM = {
loader: document.getElementById('loader'),
dbSelect: document.getElementById('databaseSelect'),
search: document.getElementById('search'),
searchContainer: document.getElementById('searchContainer'),
exactMatchBtn: document.getElementById('exactMatchBtn'),
downloadBtn: document.getElementById('downloadBtn'),
pharmacy: document.getElementById('pharmacy'),
region: document.getElementById('region'),
month: document.getElementById('month'),
method: document.getElementById('method'),
unit: document.getElementById('unit'),
reset: document.getElementById('resetFilters'),
totalUnits: document.getElementById('totalUnits'),
totalMeds: document.getElementById('totalMeds'),
totalPharmacies: document.getElementById('totalPharmacies'),
resultCount: document.getElementById('resultCount'),
filtersContainer: document.getElementById('filtersContainer'),
scrollContainer: document.getElementById('scrollContainer'),
scrollSpacer: document.getElementById('scrollSpacer'),
scrollContent: document.getElementById('scrollContent'),
tableHeader: document.getElementById('tableHeader'),
themeBtns: document.querySelectorAll('.theme-btn'),
clearBtns: document.querySelectorAll('.clear-select'),
groupPills: document.querySelectorAll('.group-pill'),
duplicateAlert: document.getElementById('duplicateAlert'),
duplicateText: document.getElementById('duplicateText'),
duplicateModal: document.getElementById('duplicateModal'),
closeModal: document.getElementById('closeModal'),
duplicateTableBody: document.getElementById('duplicateTableBody')
};

let virtualNodes = [];
let animationFrameId = null;

function initThemeSwitcher() {
let currentTheme = 'system';
try {
currentTheme = document.documentElement.getAttribute('data-theme') || localStorage.getItem('lx-theme') || 'system';
} catch (e) {}

DOM.themeBtns.forEach(btn => {
btn.classList.toggle('active', btn.dataset.value === currentTheme);
btn.addEventListener('click', () => {
const theme = btn.dataset.value;
document.documentElement.setAttribute('data-theme', theme);
try {
localStorage.setItem('lx-theme', theme);
} catch (e) {}
DOM.themeBtns.forEach(b => b.classList.toggle('active', b.dataset.value === theme));
});
});
}

function getActiveColumns() {
if (!state.groupBy.length) {
return [...COLUMNS.slice(0, 5), COLUMNS[7], COLUMNS[5], COLUMNS[6]];
}
const activeKeys = [...state.groupBy, 'unitSold'];
return COLUMNS.filter(c => activeKeys.includes(c.key));
}

function bindHeaderSort() {
document.querySelectorAll('.table-header .header-cell.sortable').forEach(header => {
header.addEventListener('click', () => {
const sortKey = header.dataset.sort;
if (state.sort.key === sortKey) {
state.sort.dir *= -1;
} else {
state.sort.key = sortKey;
state.sort.dir = 1;
}
applyState();
});
});
}

function initVirtualScroller() {
DOM.scrollContent.innerHTML = '';
virtualNodes = [];
const activeCols = getActiveColumns();

DOM.tableHeader.style.gridTemplateColumns = activeCols.map(c => c.width).join(' ');
DOM.tableHeader.innerHTML = activeCols.map(c => {
let dirAttr = '';
if (state.sort.key === c.key) {
dirAttr = `data-dir="${state.sort.dir === 1 ? 'asc' : 'desc'}"`;
}
return `<div class="header-cell sortable" data-sort="${c.key}" ${dirAttr}>
${c.label}
<svg class="sort-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
</div>`;
}).join('');

bindHeaderSort();

DOM.scrollContent.style.position = 'absolute';
DOM.scrollContent.style.top = '0';
DOM.scrollContent.style.left = '0';
DOM.scrollContent.style.width = '100%';

const nodeCount = Math.ceil(650 / ROW_HEIGHT) + 4;
for (let i = 0; i < nodeCount; i++) {
const row = document.createElement('div');
row.className = 'table-grid-row v-row';
row.style.gridTemplateColumns = activeCols.map(c => c.width).join(' ');
row.style.display = 'none';

const cells = activeCols.map((c) => {
const cell = document.createElement('div');
cell.className = 'v-cell';
if (c.isNum) cell.style.fontVariantNumeric = 'tabular-nums';
row.appendChild(cell);
return { el: cell, key: c.key, isNum: c.isNum };
});

DOM.scrollContent.appendChild(row);
virtualNodes.push({ row, cells, index: -1 });
}

DOM.scrollContainer.removeEventListener('scroll', handleScroll);
DOM.scrollContainer.addEventListener('scroll', handleScroll, { passive: true });
}

function handleScroll() {
if (!animationFrameId) {
animationFrameId = requestAnimationFrame(() => {
updateVirtualScroller();
animationFrameId = null;
});
}
}

function updateVirtualScroller(force = false) {
const scrollTop = DOM.scrollContainer.scrollTop;
const startIndex = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - 1);
const endIndex = Math.min(state.displayData.length - 1, startIndex + virtualNodes.length - 1);

let nodeIdx = 0;
for (let i = startIndex; i <= endIndex; i++) {
const node = virtualNodes[nodeIdx];
if (force || node.index !== i) {
node.index = i;
const item = state.displayData[i];
node.row.style.transform = `translateY(${i * ROW_HEIGHT}px)`;
node.row.style.display = 'grid';

node.cells.forEach(c => {
let val = item[c.key];
if (c.isNum) val = new Intl.NumberFormat().format(val || 0);
c.el.textContent = val !== undefined ? val : '-';
});
}
nodeIdx++;
}

while (nodeIdx < virtualNodes.length) {
const node = virtualNodes[nodeIdx];
node.index = -1;
node.row.style.display = 'none';
nodeIdx++;
}
}

async function loadData() {
DOM.loader.classList.add('active');
try {
const [wfRes, stRes] = await Promise.all([
fetch(URLS.workforce),
fetch(URLS.student)
]);

const wfRaw = await wfRes.json();
const stRaw = await stRes.json();

const parse = (raw, source) => raw ? Object.values(raw).flat().map(item => ({
...item,
_source: source,
_searchStr: `${source} ${item.name} ${item.pharmacy} ${item.region} ${item.month} ${item.method} ${item.unit}`.toLowerCase()
})) : [];

const allRaw = [
...parse(wfRaw, 'Workforce'),
...parse(stRaw, 'Student')
];

state.rawGroups = new Map();
state.unmergedHashes = new Set();

allRaw.forEach(item => {
const hash = `${item._source}|${item.name}|${item.pharmacy}|${item.region}|${item.month}|${item.unit}|${item.method}`;
if (!state.rawGroups.has(hash)) {
state.rawGroups.set(hash, []);
}
state.rawGroups.get(hash).push({ ...item, unitSold: Number(item.unitSold) || 0 });
});

buildBaseData();

} catch (err) {
DOM.resultCount.textContent = "Error loading database structure.";
} finally {
DOM.loader.classList.remove('active');
}
}

function buildBaseData() {
state.allData = [];
state.currentMergedGroups = [];
let mergedCount = 0;

for (const [hash, items] of state.rawGroups.entries()) {
if (items.length > 1 && !state.unmergedHashes.has(hash)) {
const mergedItem = { ...items[0], unitSold: 0 };
items.forEach(i => mergedItem.unitSold += i.unitSold);
state.allData.push(mergedItem);

state.currentMergedGroups.push({
hash,
name: mergedItem.name,
pharmacy: mergedItem.pharmacy,
region: mergedItem.region,
rowCount: items.length,
totalUnits: mergedItem.unitSold
});

mergedCount += (items.length - 1);
} else {
items.forEach(i => state.allData.push(i));
}
}

if (mergedCount > 0) {
DOM.duplicateText.innerHTML = `Merged <strong>${mergedCount}</strong> duplicate record${mergedCount > 1 ? 's' : ''} to aggregate Units Sold. Click to view and unmerge.`;
DOM.duplicateAlert.style.display = 'flex';
} else {
DOM.duplicateAlert.style.display = 'none';
}

applyState();
renderDuplicateModal();
}

function renderDuplicateModal() {
DOM.duplicateTableBody.innerHTML = '';
if (!state.currentMergedGroups || state.currentMergedGroups.length === 0) {
DOM.duplicateModal.style.display = 'none';
return;
}
state.currentMergedGroups.forEach(group => {
const tr = document.createElement('tr');
tr.innerHTML = `
<td>${group.name}</td>
<td>${group.pharmacy}</td>
<td>${group.region}</td>
<td>${group.rowCount}</td>
<td>${group.totalUnits}</td>
<td><button class="unmerge-btn" data-hash="${group.hash}">Unmerge</button></td>
`;
DOM.duplicateTableBody.appendChild(tr);
});

document.querySelectorAll('.unmerge-btn').forEach(btn => {
btn.addEventListener('click', (e) => {
const hash = e.target.getAttribute('data-hash');
state.unmergedHashes.add(hash);
buildBaseData();
});
});
}

function applyState() {
updateDropdownOptions();

const query = state.filters.search.toLowerCase().trim();
const isExact = state.filters.exactMatch;
const searchTokens = (query && !isExact) ? query.split(/\s+/) : [];

state.filtered = state.allData.filter(item => {
if (state.db !== 'all' && item._source !== state.db) return false;

if (query) {
if (isExact) {
if (!item._searchStr.includes(query)) return false;
} else {
for (let i = 0; i < searchTokens.length; i++) {
if (!item._searchStr.includes(searchTokens[i])) return false;
}
}
}

for (const key of ['pharmacy', 'region', 'month', 'method', 'unit']) {
if (state.filters[key] && item[key] !== state.filters[key]) return false;
}
return true;
});

if (state.groupBy.length === 0) {
state.displayData = [...state.filtered];
} else {
const map = new Map();
state.filtered.forEach(item => {
const key = state.groupBy.map(g => item[g]).join('|||');
if (!map.has(key)) {
const newObj = { unitSold: 0 };
state.groupBy.forEach(g => newObj[g] = item[g]);
map.set(key, newObj);
}
map.get(key).unitSold += item.unitSold;
});
state.displayData = Array.from(map.values());
}

sortData();

const activeCols = getActiveColumns();
const colsHash = activeCols.map(c => c.key).join('-');
if (state.lastColsHash !== colsHash) {
state.lastColsHash = colsHash;
initVirtualScroller();
}

updateUI();
}

function updateDropdownOptions() {
const keys = ['pharmacy', 'region', 'month', 'method', 'unit'];

keys.forEach(key => {
const validItems = state.allData.filter(item => {
if (state.db !== 'all' && item._source !== state.db) return false;

const query = state.filters.search.toLowerCase().trim();
if (query) {
if (state.filters.exactMatch) {
if (!item._searchStr.includes(query)) return false;
} else {
const tokens = query.split(/\s+/);
for (let t of tokens) {
if (!item._searchStr.includes(t)) return false;
}
}
}

for (const other of keys) {
if (other !== key && state.filters[other] && item[other] !== state.filters[other]) return false;
}
return true;
});

const unique = Array.from(new Set(validItems.map(i => i[key]))).sort();
const select = DOM[key];
const currentVal = state.filters[key];

select.innerHTML = `<option value="">All ${key.charAt(0).toUpperCase() + key.slice(1)}s</option>`;

unique.forEach(opt => {
const el = document.createElement('option');
el.value = opt;
el.textContent = opt;
select.appendChild(el);
});

if (unique.includes(currentVal)) {
select.value = currentVal;
} else {
state.filters[key] = '';
select.value = '';
}
});
}

function sortData() {
if (!state.sort.key) return;

const activeCols = getActiveColumns();
if (!activeCols.find(c => c.key === state.sort.key)) {
state.sort.key = null;
return;
}

const { key, dir } = state.sort;

state.displayData.sort((a, b) => {
const vA = a[key];
const vB = b[key];

if (typeof vA === 'string' && typeof vB === 'string') {
return vA.localeCompare(vB) * dir;
}
return ((vA || 0) - (vB || 0)) * dir;
});
}

function updateUI() {
let units = 0;
const meds = new Set();
const pharms = new Set();

state.filtered.forEach(item => {
units += item.unitSold;
meds.add(item.name);
pharms.add(item.pharmacy);
});

animateValue(DOM.totalUnits, units);
animateValue(DOM.totalMeds, meds.size);
animateValue(DOM.totalPharmacies, pharms.size);

DOM.scrollSpacer.style.height = `${state.displayData.length * ROW_HEIGHT}px`;
updateVirtualScroller(true);

const recordLabel = state.groupBy.length ? 'groups' : 'results';
DOM.resultCount.textContent = `Showing ${new Intl.NumberFormat().format(state.displayData.length)} ${recordLabel}`;

let activeCount = 0;
['pharmacy', 'region', 'month', 'method', 'unit'].forEach(k => {
const isActive = state.filters[k] !== '';
DOM[k].classList.toggle('active', isActive);
DOM[k].parentElement.classList.toggle('has-value', isActive);
if (isActive) activeCount++;
});

if (state.filters.search) activeCount++;
if (state.filters.exactMatch && state.filters.search) activeCount++;
if (state.db !== 'all') activeCount++;

DOM.filtersContainer.setAttribute(
'data-active-filters',
activeCount ? `${activeCount} active filter${activeCount > 1 ? 's' : ''}` : ''
);
}

function animateValue(obj, end) {
const start = parseInt(obj.textContent.replace(/,/g, '')) || 0;
if (start === end) {
obj.textContent = new Intl.NumberFormat().format(end);
return;
}

const duration = 600;
const startTime = performance.now();
const fmt = new Intl.NumberFormat();

function update(currentTime) {
const elapsed = currentTime - startTime;
const progress = Math.min(elapsed / duration, 1);
const easeOut = 1 - Math.pow(1 - progress, 3);
const current = Math.floor(start + (end - start) * easeOut);

obj.textContent = fmt.format(current);
if (progress < 1) requestAnimationFrame(update);
else obj.textContent = fmt.format(end);
}
requestAnimationFrame(update);
}

function downloadCSV() {
const activeCols = getActiveColumns();
const headers = activeCols.map(c => c.label);
const props = activeCols.map(c => c.key);

const fText = [
`Database: ${state.db === 'all' ? 'All' : state.db}`,
state.filters.search ? `Search: "${state.filters.search}"${state.filters.exactMatch ? ' (Exact)' : ''}` : null,
state.filters.pharmacy ? `Pharmacy: ${state.filters.pharmacy}` : null,
state.filters.region ? `Region: ${state.filters.region}` : null,
state.filters.month ? `Month: ${state.filters.month}` : null,
state.filters.method ? `Method: ${state.filters.method}` : null,
state.filters.unit ? `Unit: ${state.filters.unit}` : null,
state.groupBy.length ? `Grouped By: ${state.groupBy.join(', ')}` : null
].filter(Boolean).join(' | ');

let csv = `"Applied Options: ${fText || 'None'}"\n`;
csv += headers.map(h => `"${h}"`).join(',') + '\n';

state.displayData.forEach(row => {
csv += props.map(k => {
let val = row[k];
if (val === undefined) val = '';
return `"${String(val).replace(/"/g, '""')}"`;
}).join(',') + '\n';
});

const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = `LX_Database_Export_${new Date().toISOString().slice(0,10)}.csv`;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
}

function debounce(func, wait) {
let timeout;
return function(...args) {
clearTimeout(timeout);
timeout = setTimeout(() => func.apply(this, args), wait);
};
}

function bindEvents() {
DOM.dbSelect.addEventListener('change', (e) => {
state.db = e.target.value;
applyState();
});

DOM.downloadBtn.addEventListener('click', downloadCSV);

const handleFilter = (key) => (e) => {
state.filters[key] = e.target.value;
applyState();
};

DOM.search.addEventListener('input', debounce((e) => {
const val = e.target.value;
state.filters.search = val;
DOM.searchContainer.classList.toggle('has-value', val.length > 0);
applyState();
}, 100));

DOM.exactMatchBtn.addEventListener('click', () => {
state.filters.exactMatch = !state.filters.exactMatch;
DOM.exactMatchBtn.classList.toggle('active', state.filters.exactMatch);
if (state.filters.search) applyState();
});

document.addEventListener('keydown', (e) => {
if (e.key === '/' && document.activeElement !== DOM.search) {
e.preventDefault();
DOM.search.focus();
}
});

['pharmacy', 'region', 'month', 'method', 'unit'].forEach(key => {
DOM[key].addEventListener('change', handleFilter(key));
});

DOM.clearBtns.forEach(btn => {
btn.addEventListener('click', () => {
const target = btn.dataset.target;
state.filters[target] = '';
DOM[target].value = '';
applyState();
});
});

DOM.groupPills.forEach(pill => {
pill.addEventListener('click', () => {
const key = pill.dataset.key;
const idx = state.groupBy.indexOf(key);
if (idx > -1) {
state.groupBy.splice(idx, 1);
pill.classList.remove('active');
} else {
state.groupBy.push(key);
pill.classList.add('active');
}
applyState();
});
});

DOM.reset.addEventListener('click', () => {
state.filters = { search: '', exactMatch: false, pharmacy: '', region: '', month: '', method: '', unit: '' };
state.groupBy = [];
state.db = 'all';
state.sort = { key: null, dir: 1 };

DOM.dbSelect.value = 'all';
DOM.search.value = '';
DOM.searchContainer.classList.remove('has-value');
DOM.exactMatchBtn.classList.remove('active');
DOM.groupPills.forEach(p => p.classList.remove('active'));

['pharmacy', 'region', 'month', 'method', 'unit'].forEach(k => {
DOM[k].value = '';
DOM[k].classList.remove('active');
DOM[k].parentElement.classList.remove('has-value');
});

applyState();
});

DOM.duplicateAlert.addEventListener('click', () => {
if (state.currentMergedGroups.length > 0) {
renderDuplicateModal();
DOM.duplicateModal.style.display = 'flex';
}
});

DOM.closeModal.addEventListener('click', () => {
DOM.duplicateModal.style.display = 'none';
});

DOM.duplicateModal.addEventListener('click', (e) => {
if (e.target === DOM.duplicateModal) {
DOM.duplicateModal.style.display = 'none';
}
});

window.addEventListener('resize', debounce(() => updateVirtualScroller(true), 100));
}

document.addEventListener('DOMContentLoaded', () => {
initThemeSwitcher();
bindEvents();
loadData();
});
</script>
