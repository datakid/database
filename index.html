<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F7F6F3;
            --surface: #FFFFFF;
            --surface-hover: #F2F5F3;
            --border: #E6E4DD;
            --border-focus: #3A6B58;
            --text-main: #2D312E;
            --text-muted: #82877F;
            --accent: #3A6B58;
            --accent-light: #E8EFEA;
            --shadow-sm: 0 2px 8px rgba(45, 49, 46, 0.04);
            --shadow-md: 0 8px 24px rgba(45, 49, 46, 0.06);
            --radius: 12px;
            --font-sans: 'Be Vietnam Pro', sans-serif;
            --font-serif: 'Fraunces', serif;
            --row-height: 56px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            opacity: 0.4;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        ::selection {
            background-color: var(--accent-light);
            color: var(--accent);
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .layout {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .title-group h1 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -0.02em;
            color: var(--text-main);
        }

        .title-group p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: "";
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-right: 1.5px solid var(--text-main);
            border-bottom: 1.5px solid var(--text-main);
            pointer-events: none;
            transform-origin: center;
            transform: translateY(-70%) rotate(45deg);
        }

        select, input {
            appearance: none;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.875rem 2.5rem 0.875rem 1.25rem;
            border-radius: var(--radius);
            font-family: var(--font-sans);
            font-size: 0.9rem;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        input {
            padding-right: 1.25rem;
            cursor: text;
            width: 280px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        button.reset {
            background: var(--text-main);
            color: var(--surface);
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: var(--radius);
            font-family: var(--font-sans);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button.reset:hover {
            background: var(--accent);
            transform: translateY(-1px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .stat-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-value {
            font-family: var(--font-serif);
            font-size: 3rem;
            font-weight: 300;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 0.75rem;
        }

        .stat-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .table-container {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 500px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
            overflow: hidden;
        }

        .grid-row {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 1fr 1fr;
            gap: 1rem;
            padding: 0 1.5rem;
            align-items: center;
        }

        .table-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }

        .header-cell {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
            height: var(--row-height);
            display: flex;
            align-items: center;
        }

        .scroll-viewport {
            flex: 1;
            overflow: auto;
            position: relative;
            will-change: transform;
        }

        .v-row {
            border-bottom: 1px solid var(--border);
            transition: background-color 0.15s ease;
            cursor: default;
        }

        .v-row:hover {
            background-color: var(--surface-hover);
        }

        .v-cell {
            font-size: 0.95rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .v-cell.numeric {
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
        }

        .loader-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .loader-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .loader-pulse {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1.5s cubic-bezier(0.16, 1, 0.3, 1) infinite;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: 1fr; }
            .grid-row { min-width: 900px; }
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
            input { width: 100%; }
            .layout { padding: 1rem; }
        }
    </style>
</head>
<body>

    <div class="loader-overlay active" id="loader">
        <div class="loader-pulse"></div>
    </div>

    <div class="layout">
        <header class="header">
            <div class="title-group">
                <h1>Apothecary Intelligence</h1>
                <p>Systemic tracking of pharmaceutical distribution and workforce analytics.</p>
            </div>
            <div class="controls">
                <div class="select-wrapper">
                    <select id="databaseSelect">
                        <option value="workforce">Workforce Logistics</option>
                        <option value="student">Student Operations</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="filter-grid">
            <input type="text" id="search" placeholder="Search medication nomenclature...">
            <div class="select-wrapper"><select id="pharmacy"><option value="">All Pharmacies</option></select></div>
            <div class="select-wrapper"><select id="region"><option value="">All Regions</option></select></div>
            <div class="select-wrapper"><select id="month"><option value="">All Months</option></select></div>
            <div class="select-wrapper"><select id="method"><option value="">All Methods</option></select></div>
            <div class="select-wrapper"><select id="unit"><option value="">All Unit Types</option></select></div>
            <button class="reset" id="resetFilters">Clear Filters</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalUnits">0</div>
                <div class="stat-label">Volume Distributed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalMeds">0</div>
                <div class="stat-label">Unique Compounds</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalPharmacies">0</div>
                <div class="stat-label">Active Facilities</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header grid-row">
                <div class="header-cell">Medication</div>
                <div class="header-cell">Facility</div>
                <div class="header-cell">Region</div>
                <div class="header-cell">Period</div>
                <div class="header-cell">Volume</div>
                <div class="header-cell">Classification</div>
                <div class="header-cell">Methodology</div>
            </div>
            <div class="scroll-viewport" id="scrollContainer">
                <div id="scrollSpacer"></div>
                <div id="scrollContent"></div>
            </div>
            <div class="status-bar">
                <span id="resultCount">Synchronizing data...</span>
                <span id="activeFilters">System nominal</span>
            </div>
        </div>
    </div>

    <script>
        const ROW_HEIGHT = 56;
        const CACHE = new Map();
        const URLS = {
            workforce: "https://plan-b-d4c36-default-rtdb.firebaseio.com/pharmacyData.json",
            student: "https://plan-c-464c2-default-rtdb.firebaseio.com/pharmacyData.json"
        };

        const state = {
            data:[],
            filtered:[],
            db: 'workforce',
            filters: { search: '', pharmacy: '', region: '', month: '', method: '', unit: '' }
        };

        const DOM = {
            loader: document.getElementById('loader'),
            dbSelect: document.getElementById('databaseSelect'),
            search: document.getElementById('search'),
            pharmacy: document.getElementById('pharmacy'),
            region: document.getElementById('region'),
            month: document.getElementById('month'),
            method: document.getElementById('method'),
            unit: document.getElementById('unit'),
            reset: document.getElementById('resetFilters'),
            totalUnits: document.getElementById('totalUnits'),
            totalMeds: document.getElementById('totalMeds'),
            totalPharmacies: document.getElementById('totalPharmacies'),
            resultCount: document.getElementById('resultCount'),
            activeFilters: document.getElementById('activeFilters'),
            scrollContainer: document.getElementById('scrollContainer'),
            scrollSpacer: document.getElementById('scrollSpacer'),
            scrollContent: document.getElementById('scrollContent')
        };

        let virtualNodes =[];
        let animationFrameId = null;

        function initVirtualScroller() {
            DOM.scrollContent.style.position = 'absolute';
            DOM.scrollContent.style.top = '0';
            DOM.scrollContent.style.left = '0';
            DOM.scrollContent.style.width = '100%';

            const viewportHeight = window.innerHeight * 0.7; 
            const nodeCount = Math.ceil(viewportHeight / ROW_HEIGHT) + 4;

            for (let i = 0; i < nodeCount; i++) {
                const row = document.createElement('div');
                row.className = 'grid-row v-row';
                row.style.height = `${ROW_HEIGHT}px`;
                row.style.position = 'absolute';
                row.style.left = '0';
                row.style.right = '0';
                row.style.display = 'none';

                const cells = Array.from({length: 7}).map((_, idx) => {
                    const cell = document.createElement('div');
                    cell.className = `v-cell ${idx === 4 ? 'numeric' : ''}`;
                    row.appendChild(cell);
                    return cell;
                });

                DOM.scrollContent.appendChild(row);
                virtualNodes.push({ row, cells, index: -1 });
            }

            DOM.scrollContainer.addEventListener('scroll', () => {
                if (!animationFrameId) {
                    animationFrameId = requestAnimationFrame(() => {
                        updateVirtualScroller();
                        animationFrameId = null;
                    });
                }
            }, { passive: true });
        }

        function updateVirtualScroller(force = false) {
            const scrollTop = DOM.scrollContainer.scrollTop;
            const startIndex = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - 1);
            const endIndex = Math.min(state.filtered.length - 1, startIndex + virtualNodes.length - 1);

            let nodeIdx = 0;
            for (let i = startIndex; i <= endIndex; i++) {
                const node = virtualNodes[nodeIdx];
                if (force || node.index !== i) {
                    node.index = i;
                    const item = state.filtered[i];
                    node.row.style.transform = `translateY(${i * ROW_HEIGHT}px)`;
                    node.row.style.display = 'grid';
                    
                    node.cells[0].textContent = item.name;
                    node.cells[1].textContent = item.pharmacy;
                    node.cells[2].textContent = item.region;
                    node.cells[3].textContent = item.month;
                    node.cells[4].textContent = new Intl.NumberFormat().format(item.unitSold);
                    node.cells[5].textContent = item.unit;
                    node.cells[6].textContent = item.method;
                }
                nodeIdx++;
            }

            while (nodeIdx < virtualNodes.length) {
                const node = virtualNodes[nodeIdx];
                node.index = -1;
                node.row.style.display = 'none';
                nodeIdx++;
            }
        }

        async function loadData() {
            DOM.loader.classList.add('active');
            try {
                if (!CACHE.has(state.db)) {
                    const response = await fetch(URLS[state.db]);
                    const raw = await response.json();
                    CACHE.set(state.db, Object.values(raw).flat());
                }
                state.data = CACHE.get(state.db);
                processData();
            } catch (err) {
                DOM.resultCount.textContent = "Telemetry disruption detected.";
            } finally {
                DOM.loader.classList.remove('active');
            }
        }

        function processData() {
            populateOptions();
            applyFilters();
        }

        function populateOptions() {
            const keys = ['pharmacy', 'region', 'month', 'method', 'unit'];
            const sets = Object.fromEntries(keys.map(k => [k, new Set()]));
            
            state.data.forEach(item => {
                keys.forEach(k => sets[k].add(item[k]));
            });

            keys.forEach(key => {
                const select = DOM[key];
                const current = select.value;
                const options = Array.from(sets[key]).sort();
                
                select.innerHTML = `<option value="">All ${key.charAt(0).toUpperCase() + key.slice(1)}s</option>`;
                const frag = document.createDocumentFragment();
                
                options.forEach(opt => {
                    const el = document.createElement('option');
                    el.value = opt;
                    el.textContent = opt;
                    frag.appendChild(el);
                });
                
                select.appendChild(frag);
                if (options.includes(current)) select.value = current;
            });
        }

        function applyFilters() {
            const searchLower = state.filters.search.toLowerCase();
            
            state.filtered = state.data.filter(item => {
                if (searchLower && !item.name.toLowerCase().includes(searchLower)) return false;
                for (const key of['pharmacy', 'region', 'month', 'method', 'unit']) {
                    if (state.filters[key] && item[key] !== state.filters[key]) return false;
                }
                return true;
            });

            updateUI();
        }

        function updateUI() {
            let units = 0;
            const meds = new Set();
            const pharms = new Set();

            state.filtered.forEach(item => {
                units += item.unitSold;
                meds.add(item.name);
                pharms.add(item.pharmacy);
            });

            const formatter = new Intl.NumberFormat();
            
            animateValue(DOM.totalUnits, units);
            animateValue(DOM.totalMeds, meds.size);
            animateValue(DOM.totalPharmacies, pharms.size);

            DOM.scrollSpacer.style.height = `${state.filtered.length * ROW_HEIGHT}px`;
            updateVirtualScroller(true);

            DOM.resultCount.textContent = `Displaying ${formatter.format(state.filtered.length)} records`;
            
            const activeCount = Object.values(state.filters).filter(v => v !== '').length;
            DOM.activeFilters.textContent = activeCount ? `${activeCount} telemetry filters active` : 'System nominal';
        }

        function animateValue(obj, end) {
            const start = parseInt(obj.textContent.replace(/,/g, '')) || 0;
            if (start === end) return;
            
            const duration = 800;
            const startTime = performance.now();
            const formatter = new Intl.NumberFormat();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                
                const current = Math.floor(start + (end - start) * easeOut);
                obj.textContent = formatter.format(current);

                if (progress < 1) requestAnimationFrame(update);
                else obj.textContent = formatter.format(end);
            }
            requestAnimationFrame(update);
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        function bindEvents() {
            DOM.dbSelect.addEventListener('change', (e) => {
                state.db = e.target.value;
                loadData();
            });

            const handleFilter = (key) => (e) => {
                state.filters[key] = e.target.value;
                applyFilters();
            };

            DOM.search.addEventListener('input', debounce((e) => {
                state.filters.search = e.target.value;
                applyFilters();
            }, 200));['pharmacy', 'region', 'month', 'method', 'unit'].forEach(key => {
                DOM[key].addEventListener('change', handleFilter(key));
            });

            DOM.reset.addEventListener('click', () => {
                state.filters = { search: '', pharmacy: '', region: '', month: '', method: '', unit: '' };
                DOM.search.value = '';
                ['pharmacy', 'region', 'month', 'method', 'unit'].forEach(k => DOM[k].value = '');
                applyFilters();
            });

            window.addEventListener('resize', debounce(() => {
                updateVirtualScroller(true);
            }, 100));
        }

        document.addEventListener('DOMContentLoaded', () => {
            initVirtualScroller();
            bindEvents();
            loadData();
        });
    </script>
</body>
</html>
